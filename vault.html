<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIGHTONOMY VAULT</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Orbitron:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cyan: #00f0ff;
    --cyan-dim: #00f0ff33;
    --magenta: #ff00e5;
    --green: #00ff88;
    --red: #ff3355;
    --bg: #0a0a12;
    --card: #0d0d1a;
    --border: #1a1a2e;
  }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: #e0e0e0;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Matrix rain canvas */
  #matrix {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    opacity: 0.07;
    pointer-events: none;
  }

  /* Scan line effect */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 30px 20px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 40px;
    position: relative;
  }

  .header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 2.8rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--cyan), var(--magenta));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 40px rgba(0,240,255,0.3);
    letter-spacing: 6px;
    animation: glitch 4s infinite;
  }

  .header .subtitle {
    font-size: 0.75rem;
    color: var(--cyan);
    letter-spacing: 8px;
    margin-top: 8px;
    opacity: 0.7;
    text-transform: uppercase;
  }

  .header .lock-icon {
    font-size: 3rem;
    margin-bottom: 10px;
    display: block;
    filter: drop-shadow(0 0 20px var(--cyan));
  }

  @keyframes glitch {
    0%, 90%, 100% { opacity: 1; transform: translate(0); }
    92% { opacity: 0.8; transform: translate(-2px, 1px); }
    94% { opacity: 0.9; transform: translate(2px, -1px); }
    96% { opacity: 1; transform: translate(0); }
  }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-bottom: 30px;
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .status-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
  }

  .status-dot.red { background: var(--red); box-shadow: 0 0 8px var(--red); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Login screen */
  .login-screen, .vault-screen { display: none; }
  .login-screen.active, .vault-screen.active { display: block; }

  .login-box {
    max-width: 450px;
    margin: 60px auto;
    padding: 40px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    position: relative;
    overflow: hidden;
  }

  .login-box::before {
    content: '';
    position: absolute;
    top: -1px; left: -1px; right: -1px; bottom: -1px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--cyan), transparent, var(--magenta));
    z-index: -1;
    opacity: 0.3;
  }

  .login-box h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.1rem;
    color: var(--cyan);
    margin-bottom: 25px;
    letter-spacing: 3px;
    text-align: center;
  }

  .input-group {
    margin-bottom: 20px;
    position: relative;
  }

  .input-group label {
    display: block;
    font-size: 0.65rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 8px;
  }

  .input-group input, .input-group select {
    width: 100%;
    padding: 12px 16px;
    background: #0a0a14;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--cyan);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    transition: all 0.3s;
    outline: none;
  }

  .input-group input:focus, .input-group select:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 15px rgba(0,240,255,0.15);
  }

  .input-group input::placeholder {
    color: #333;
  }

  .input-group input[type="password"] {
    font-size: 1.1rem;
    letter-spacing: 4px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 24px;
    border: 1px solid var(--cyan);
    background: transparent;
    color: var(--cyan);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s;
    width: 100%;
  }

  .btn:hover {
    background: var(--cyan);
    color: var(--bg);
    box-shadow: 0 0 25px rgba(0,240,255,0.4);
  }

  .btn.danger {
    border-color: var(--red);
    color: var(--red);
  }
  .btn.danger:hover {
    background: var(--red);
    color: #fff;
    box-shadow: 0 0 25px rgba(255,51,85,0.4);
  }

  .btn.small {
    padding: 6px 14px;
    font-size: 0.6rem;
    width: auto;
    letter-spacing: 1px;
  }

  .btn.green {
    border-color: var(--green);
    color: var(--green);
  }
  .btn.green:hover {
    background: var(--green);
    color: var(--bg);
    box-shadow: 0 0 25px rgba(0,255,136,0.4);
  }

  /* Vault UI */
  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .toolbar .search-box {
    flex: 1;
    max-width: 350px;
    padding: 10px 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: #e0e0e0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    outline: none;
    transition: border-color 0.3s;
  }

  .toolbar .search-box:focus {
    border-color: var(--cyan);
  }

  .toolbar-actions {
    display: flex;
    gap: 8px;
  }

  /* Entries */
  .entries-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .entry-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    position: relative;
    transition: all 0.3s;
    overflow: hidden;
  }

  .entry-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(to bottom, var(--cyan), var(--magenta));
    border-radius: 3px 0 0 3px;
  }

  .entry-card:hover {
    border-color: var(--cyan-dim);
    transform: translateX(4px);
    box-shadow: 0 0 20px rgba(0,240,255,0.05);
  }

  .entry-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }

  .entry-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85rem;
    color: var(--cyan);
    letter-spacing: 1px;
  }

  .entry-category {
    font-size: 0.55rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    background: rgba(255,0,229,0.1);
    color: var(--magenta);
    border: 1px solid rgba(255,0,229,0.2);
  }

  .entry-details {
    margin: 10px 0;
  }

  .entry-field {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
    font-size: 0.75rem;
  }

  .entry-field .field-label {
    color: #555;
    min-width: 70px;
    font-size: 0.6rem;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .entry-field .field-value {
    color: #aaa;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .entry-field .field-value.masked {
    color: var(--cyan);
    letter-spacing: 3px;
    font-size: 0.9rem;
  }

  .entry-actions {
    display: flex;
    gap: 6px;
    margin-top: 12px;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #333;
  }

  .empty-state .empty-icon {
    font-size: 3rem;
    margin-bottom: 15px;
    opacity: 0.3;
  }

  .empty-state p {
    font-size: 0.8rem;
    letter-spacing: 2px;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    z-index: 500;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.active {
    display: flex;
  }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 35px;
    width: 90%;
    max-width: 480px;
    position: relative;
    animation: modalIn 0.3s;
  }

  .modal::before {
    content: '';
    position: absolute;
    top: -1px; left: -1px; right: -1px; bottom: -1px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--cyan), transparent, var(--magenta));
    z-index: -1;
    opacity: 0.2;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal h3 {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.9rem;
    color: var(--cyan);
    letter-spacing: 3px;
    margin-bottom: 25px;
    text-align: center;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 25px;
  }

  .modal-actions .btn { flex: 1; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    padding: 12px 24px;
    background: var(--card);
    border: 1px solid var(--green);
    border-radius: 8px;
    color: var(--green);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 1px;
    z-index: 9999;
    animation: toastIn 0.3s;
    box-shadow: 0 0 20px rgba(0,255,136,0.2);
  }

  @keyframes toastIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Password strength meter */
  .strength-meter {
    height: 3px;
    border-radius: 3px;
    background: var(--border);
    margin-top: 8px;
    overflow: hidden;
  }

  .strength-meter .fill {
    height: 100%;
    border-radius: 3px;
    transition: all 0.3s;
  }

  /* Fingerprint animation */
  .fingerprint {
    width: 80px; height: 80px;
    margin: 0 auto 20px;
    position: relative;
  }

  .fingerprint svg {
    width: 100%; height: 100%;
    stroke: var(--cyan);
    stroke-width: 1.5;
    fill: none;
    filter: drop-shadow(0 0 10px var(--cyan));
  }

  .fingerprint svg path {
    stroke-dasharray: 300;
    stroke-dashoffset: 300;
    animation: drawPrint 2s forwards;
  }

  @keyframes drawPrint {
    to { stroke-dashoffset: 0; }
  }

  /* Toggle password visibility */
  .toggle-vis {
    position: absolute;
    right: 12px;
    top: 38px;
    background: none;
    border: none;
    color: #555;
    cursor: pointer;
    font-size: 0.8rem;
    transition: color 0.3s;
  }

  .toggle-vis:hover { color: var(--cyan); }

  /* Encrypted badge */
  .encrypted-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.6rem;
    letter-spacing: 2px;
    color: var(--green);
    margin-top: 15px;
    opacity: 0.6;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .header h1 { font-size: 1.6rem; letter-spacing: 3px; }
    .toolbar { flex-direction: column; }
    .toolbar .search-box { max-width: 100%; }
    .entry-header { flex-direction: column; gap: 8px; }
    .modal { padding: 25px; }
  }

  /* Generate password strength colors */
  .str-weak { background: var(--red); width: 25%; }
  .str-fair { background: #ff8800; width: 50%; }
  .str-good { background: #ffcc00; width: 75%; }
  .str-strong { background: var(--green); width: 100%; }
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="app">
  <!-- Header -->
  <div class="header">
    <span class="lock-icon">🔐</span>
    <h1>VAULT</h1>
    <div class="subtitle">Lightonomy Encrypted Storage</div>
  </div>

  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-item">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">AES-256-GCM READY</span>
    </div>
    <div class="status-item">
      <span style="color:#555">ENTRIES:</span>
      <span id="entryCount" style="color:var(--cyan)">0</span>
    </div>
  </div>

  <!-- LOGIN SCREEN -->
  <div class="login-screen active" id="loginScreen">
    <div class="login-box">
      <div class="fingerprint">
        <svg viewBox="0 0 80 80">
          <path d="M40 10 C20 10 10 25 10 40 C10 55 20 70 40 70 C60 70 70 55 70 40 C70 25 60 10 40 10"/>
          <path d="M40 18 C25 18 18 30 18 40 C18 50 25 62 40 62 C55 62 62 50 62 40 C62 30 55 18 40 18"/>
          <path d="M40 26 C30 26 26 33 26 40 C26 47 30 54 40 54 C50 54 54 47 54 40 C54 33 50 26 40 26"/>
          <path d="M40 34 C35 34 34 37 34 40 C34 43 35 46 40 46 C45 46 46 43 46 40 C46 37 45 34 40 34"/>
        </svg>
      </div>
      <h2>AUTHENTICATE</h2>
      <div class="input-group">
        <label>Master Key</label>
        <input type="password" id="masterKeyInput" placeholder="Enter your secret code..." autofocus>
        <button class="toggle-vis" onclick="toggleVis('masterKeyInput')">SHOW</button>
        <div class="strength-meter"><div class="fill" id="masterStrength"></div></div>
      </div>
      <div id="loginHint" style="font-size:0.65rem;color:#555;text-align:center;margin-bottom:15px;">
        First time? Your key becomes the permanent master password.
      </div>
      <button class="btn" onclick="authenticate()">
        <span>UNLOCK VAULT</span>
      </button>
      <div class="encrypted-badge" style="justify-content:center;margin-top:20px;">
        <span>&#9670;</span> END-TO-END ENCRYPTED <span>&#9670;</span> LOCAL ONLY <span>&#9670;</span> ZERO KNOWLEDGE
      </div>
    </div>
  </div>

  <!-- VAULT SCREEN -->
  <div class="vault-screen" id="vaultScreen">
    <div class="toolbar">
      <input type="text" class="search-box" placeholder="Search entries..." id="searchBox" oninput="renderEntries()">
      <div class="toolbar-actions">
        <button class="btn small green" onclick="openAddModal()">+ ADD</button>
        <button class="btn small" onclick="exportVault()">EXPORT</button>
        <button class="btn small" onclick="document.getElementById('importFile').click()">IMPORT</button>
        <button class="btn small danger" onclick="lockVault()">LOCK</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importVault(event)">
      </div>
    </div>
    <div class="entries-grid" id="entriesGrid"></div>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3 id="modalTitle">NEW ENTRY</h3>
    <div class="input-group">
      <label>Title</label>
      <input type="text" id="entryTitle" placeholder="e.g. Gmail, AWS, Discord...">
    </div>
    <div class="input-group">
      <label>Category</label>
      <select id="entryCategory">
        <option value="social">Social</option>
        <option value="work">Work</option>
        <option value="finance">Finance</option>
        <option value="dev">Dev/Tech</option>
        <option value="crypto">Crypto</option>
        <option value="email">Email</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="input-group">
      <label>Username / Email</label>
      <input type="text" id="entryUser" placeholder="user@example.com">
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="entryPass" placeholder="Your password">
      <button class="toggle-vis" onclick="toggleVis('entryPass')">SHOW</button>
      <div class="strength-meter"><div class="fill" id="entryStrength"></div></div>
    </div>
    <div style="text-align:right;margin-top:-10px;margin-bottom:10px;">
      <button class="btn small" onclick="generatePassword()" style="font-size:0.55rem;">GENERATE SECURE</button>
    </div>
    <div class="input-group">
      <label>URL (optional)</label>
      <input type="text" id="entryUrl" placeholder="https://...">
    </div>
    <div class="input-group">
      <label>Notes (optional)</label>
      <input type="text" id="entryNotes" placeholder="Additional info...">
    </div>
    <input type="hidden" id="editIndex" value="-1">
    <div class="modal-actions">
      <button class="btn" onclick="saveEntry()">ENCRYPT & SAVE</button>
      <button class="btn danger" onclick="closeAddModal()">CANCEL</button>
    </div>
  </div>
</div>

<script>
// ========== MATRIX RAIN ==========
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEF';
const fontSize = 14;
const columns = Math.floor(canvas.width / fontSize);
const drops = Array(columns).fill(1);

function drawMatrix() {
  ctx.fillStyle = 'rgba(10,10,18,0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#00f0ff';
  ctx.font = fontSize + 'px monospace';
  for (let i = 0; i < drops.length; i++) {
    const text = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  }
}
setInterval(drawMatrix, 50);
window.addEventListener('resize', () => { canvas.width = innerWidth; canvas.height = innerHeight; });

// ========== CRYPTO ENGINE ==========
const SALT_LEN = 16;
const IV_LEN = 12;
const ITER = 600000;

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: ITER, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['encrypt', 'decrypt']
  );
}

async function encrypt(plaintext, password) {
  const enc = new TextEncoder();
  const salt = crypto.getRandomValues(new Uint8Array(SALT_LEN));
  const iv = crypto.getRandomValues(new Uint8Array(IV_LEN));
  const key = await deriveKey(password, salt);
  const ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(plaintext));
  const result = new Uint8Array(salt.length + iv.length + ciphertext.byteLength);
  result.set(salt, 0);
  result.set(iv, salt.length);
  result.set(new Uint8Array(ciphertext), salt.length + iv.length);
  return btoa(String.fromCharCode(...result));
}

async function decrypt(b64, password) {
  const data = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const salt = data.slice(0, SALT_LEN);
  const iv = data.slice(SALT_LEN, SALT_LEN + IV_LEN);
  const ciphertext = data.slice(SALT_LEN + IV_LEN);
  const key = await deriveKey(password, salt);
  const plaintext = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
  return new TextDecoder().decode(plaintext);
}

// ========== VAULT STATE ==========
let masterKey = '';
let entries = [];
const STORAGE_KEY = 'lightonomy_vault';
const CHECK_KEY = 'lightonomy_vault_check';

// ========== AUTH ==========
async function authenticate() {
  const input = document.getElementById('masterKeyInput').value;
  if (!input || input.length < 4) {
    toast('Key must be at least 4 characters', true);
    return;
  }

  const stored = localStorage.getItem(STORAGE_KEY);
  const check = localStorage.getItem(CHECK_KEY);

  if (!stored && !check) {
    // First time — create vault
    masterKey = input;
    entries = [];
    const checkVal = await encrypt('LIGHTONOMY_VAULT_OK', masterKey);
    localStorage.setItem(CHECK_KEY, checkVal);
    await saveVault();
    showVault();
    toast('Vault created! Master key set.');
    document.getElementById('loginHint').textContent = '';
  } else {
    // Existing vault — verify
    try {
      const checkVal = await decrypt(check, input);
      if (checkVal !== 'LIGHTONOMY_VAULT_OK') throw new Error();
      masterKey = input;
      if (stored) {
        const json = await decrypt(stored, masterKey);
        entries = JSON.parse(json);
      } else {
        entries = [];
      }
      showVault();
      toast('Access granted');
    } catch (e) {
      toast('ACCESS DENIED — Wrong master key', true);
      document.getElementById('masterKeyInput').value = '';
      document.getElementById('statusDot').classList.add('red');
      setTimeout(() => document.getElementById('statusDot').classList.remove('red'), 2000);
    }
  }
}

async function saveVault() {
  const json = JSON.stringify(entries);
  const encrypted = await encrypt(json, masterKey);
  localStorage.setItem(STORAGE_KEY, encrypted);
  document.getElementById('entryCount').textContent = entries.length;
}

function showVault() {
  document.getElementById('loginScreen').classList.remove('active');
  document.getElementById('vaultScreen').classList.add('active');
  document.getElementById('statusText').textContent = 'VAULT UNLOCKED';
  document.getElementById('entryCount').textContent = entries.length;
  renderEntries();
}

function lockVault() {
  masterKey = '';
  entries = [];
  document.getElementById('vaultScreen').classList.remove('active');
  document.getElementById('loginScreen').classList.add('active');
  document.getElementById('masterKeyInput').value = '';
  document.getElementById('statusText').textContent = 'AES-256-GCM READY';
  toast('Vault locked');
}

// ========== ENTRIES ==========
function renderEntries() {
  const grid = document.getElementById('entriesGrid');
  const query = document.getElementById('searchBox').value.toLowerCase();
  const filtered = entries.filter((e, i) => {
    e._idx = i;
    return e.title.toLowerCase().includes(query) ||
           e.user.toLowerCase().includes(query) ||
           e.category.toLowerCase().includes(query);
  });

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">&#128274;</div>
        <p>${entries.length === 0 ? 'VAULT EMPTY — ADD YOUR FIRST ENTRY' : 'NO MATCHES FOUND'}</p>
      </div>`;
    return;
  }

  grid.innerHTML = filtered.map(e => `
    <div class="entry-card">
      <div class="entry-header">
        <div class="entry-title">${esc(e.title)}</div>
        <span class="entry-category">${esc(e.category)}</span>
      </div>
      <div class="entry-details">
        <div class="entry-field">
          <span class="field-label">User</span>
          <span class="field-value">${esc(e.user)}</span>
        </div>
        <div class="entry-field">
          <span class="field-label">Pass</span>
          <span class="field-value masked" id="pass-${e._idx}">&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;</span>
        </div>
        ${e.url ? `<div class="entry-field"><span class="field-label">URL</span><span class="field-value">${esc(e.url)}</span></div>` : ''}
        ${e.notes ? `<div class="entry-field"><span class="field-label">Notes</span><span class="field-value">${esc(e.notes)}</span></div>` : ''}
      </div>
      <div class="entry-actions">
        <button class="btn small" onclick="revealPass(${e._idx})">REVEAL</button>
        <button class="btn small" onclick="copyPass(${e._idx})">COPY</button>
        <button class="btn small" onclick="editEntry(${e._idx})">EDIT</button>
        <button class="btn small danger" onclick="deleteEntry(${e._idx})">DELETE</button>
      </div>
    </div>
  `).join('');
}

function revealPass(idx) {
  const el = document.getElementById('pass-' + idx);
  if (el.dataset.revealed === '1') {
    el.textContent = '\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022';
    el.dataset.revealed = '0';
  } else {
    el.textContent = entries[idx].password;
    el.dataset.revealed = '1';
    setTimeout(() => {
      el.textContent = '\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022';
      el.dataset.revealed = '0';
    }, 5000);
  }
}

function copyPass(idx) {
  navigator.clipboard.writeText(entries[idx].password);
  toast('Password copied to clipboard');
  setTimeout(() => navigator.clipboard.writeText(''), 30000);
}

// ========== ADD/EDIT MODAL ==========
function openAddModal() {
  document.getElementById('modalTitle').textContent = 'NEW ENTRY';
  document.getElementById('entryTitle').value = '';
  document.getElementById('entryCategory').value = 'other';
  document.getElementById('entryUser').value = '';
  document.getElementById('entryPass').value = '';
  document.getElementById('entryUrl').value = '';
  document.getElementById('entryNotes').value = '';
  document.getElementById('editIndex').value = '-1';
  document.getElementById('addModal').classList.add('active');
}

function editEntry(idx) {
  const e = entries[idx];
  document.getElementById('modalTitle').textContent = 'EDIT ENTRY';
  document.getElementById('entryTitle').value = e.title;
  document.getElementById('entryCategory').value = e.category;
  document.getElementById('entryUser').value = e.user;
  document.getElementById('entryPass').value = e.password;
  document.getElementById('entryUrl').value = e.url || '';
  document.getElementById('entryNotes').value = e.notes || '';
  document.getElementById('editIndex').value = idx;
  document.getElementById('addModal').classList.add('active');
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('active');
}

async function saveEntry() {
  const title = document.getElementById('entryTitle').value.trim();
  const user = document.getElementById('entryUser').value.trim();
  const pass = document.getElementById('entryPass').value;
  if (!title || !pass) {
    toast('Title and password are required', true);
    return;
  }
  const entry = {
    title,
    category: document.getElementById('entryCategory').value,
    user,
    password: pass,
    url: document.getElementById('entryUrl').value.trim(),
    notes: document.getElementById('entryNotes').value.trim(),
    created: new Date().toISOString()
  };
  const idx = parseInt(document.getElementById('editIndex').value);
  if (idx >= 0) {
    entry.created = entries[idx].created;
    entry.modified = new Date().toISOString();
    entries[idx] = entry;
  } else {
    entries.push(entry);
  }
  await saveVault();
  closeAddModal();
  renderEntries();
  toast(idx >= 0 ? 'Entry updated & encrypted' : 'Entry saved & encrypted');
}

async function deleteEntry(idx) {
  if (!confirm('Delete "' + entries[idx].title + '"? This cannot be undone.')) return;
  entries.splice(idx, 1);
  await saveVault();
  renderEntries();
  toast('Entry deleted');
}

// ========== EXPORT ==========
async function exportVault() {
  const data = localStorage.getItem(STORAGE_KEY);
  if (!data) { toast('Nothing to export', true); return; }
  const blob = new Blob([JSON.stringify({
    format: 'lightonomy-vault-v1',
    exported: new Date().toISOString(),
    check: localStorage.getItem(CHECK_KEY),
    data
  }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const now = new Date();
  const stamp = now.getFullYear().toString()
    + String(now.getMonth()+1).padStart(2,'0')
    + String(now.getDate()).padStart(2,'0')
    + '-'
    + String(now.getHours()).padStart(2,'0')
    + String(now.getMinutes()).padStart(2,'0');
  a.download = `Vault-Backup_${stamp}.json`;
  a.click();
  toast('Encrypted backup exported');
}

// ========== IMPORT ==========
async function importVault(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';

  try {
    const text = await file.text();
    const json = JSON.parse(text);

    if (json.format !== 'lightonomy-vault-v1' || !json.data || !json.check) {
      toast('Invalid vault backup file', true);
      return;
    }

    // Verify the master key works with the imported data
    try {
      const checkVal = await decrypt(json.check, masterKey);
      if (checkVal !== 'LIGHTONOMY_VAULT_OK') throw new Error();
    } catch (e) {
      toast('Your current Master Key does not match this backup. Use the same key you created it with.', true);
      return;
    }

    // Decrypt imported entries
    const importedJson = await decrypt(json.data, masterKey);
    const importedEntries = JSON.parse(importedJson);

    if (!Array.isArray(importedEntries)) {
      toast('Corrupted backup data', true);
      return;
    }

    // Ask user: merge or replace?
    const action = entries.length > 0
      ? confirm(
          `Found ${importedEntries.length} entries in backup.\n\n` +
          `OK = MERGE (add to your ${entries.length} existing entries)\n` +
          `Cancel = REPLACE (overwrite everything with backup)`
        )
      : false;

    if (action) {
      // Merge: add imported entries, skip exact duplicates by title+user
      const existingKeys = new Set(entries.map(e => e.title + '|' + e.user));
      let added = 0;
      for (const entry of importedEntries) {
        const key = entry.title + '|' + entry.user;
        if (!existingKeys.has(key)) {
          entries.push(entry);
          existingKeys.add(key);
          added++;
        }
      }
      await saveVault();
      renderEntries();
      toast(`Merged! ${added} new entries added, ${importedEntries.length - added} duplicates skipped`);
    } else {
      // Replace
      entries = importedEntries;
      await saveVault();
      renderEntries();
      toast(`Imported ${entries.length} entries successfully`);
    }

  } catch (e) {
    toast('Error reading backup file', true);
    console.error(e);
  }
}

// ========== PASSWORD GENERATOR ==========
function generatePassword() {
  const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*_+-=';
  const arr = new Uint32Array(20);
  crypto.getRandomValues(arr);
  const pass = Array.from(arr).map(n => chars[n % chars.length]).join('');
  document.getElementById('entryPass').value = pass;
  updateStrength('entryPass', 'entryStrength');
  toast('Secure password generated (20 chars)');
}

// ========== HELPERS ==========
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function toast(msg, isError) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  if (isError) { t.style.borderColor = 'var(--red)'; t.style.color = 'var(--red)'; }
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function toggleVis(id) {
  const el = document.getElementById(id);
  const btn = el.nextElementSibling;
  if (el.type === 'password') { el.type = 'text'; btn.textContent = 'HIDE'; }
  else { el.type = 'password'; btn.textContent = 'SHOW'; }
}

function getStrength(pass) {
  let score = 0;
  if (pass.length >= 8) score++;
  if (pass.length >= 14) score++;
  if (/[a-z]/.test(pass) && /[A-Z]/.test(pass)) score++;
  if (/\d/.test(pass)) score++;
  if (/[^a-zA-Z0-9]/.test(pass)) score++;
  if (score <= 1) return 'weak';
  if (score <= 2) return 'fair';
  if (score <= 3) return 'good';
  return 'strong';
}

function updateStrength(inputId, meterId) {
  const val = document.getElementById(inputId).value;
  const meter = document.getElementById(meterId);
  if (!val) { meter.className = 'fill'; return; }
  meter.className = 'fill str-' + getStrength(val);
}

// Input listeners for strength meters
document.getElementById('masterKeyInput').addEventListener('input', () => updateStrength('masterKeyInput', 'masterStrength'));
document.getElementById('entryPass').addEventListener('input', () => updateStrength('entryPass', 'entryStrength'));

// Enter key to login
document.getElementById('masterKeyInput').addEventListener('keydown', e => { if (e.key === 'Enter') authenticate(); });

// Check if vault exists on load
if (localStorage.getItem(CHECK_KEY)) {
  document.getElementById('loginHint').textContent = 'Vault detected. Enter your master key.';
}
</script>
